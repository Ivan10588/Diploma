{% extends "base.html" %}

{% block title %}Оставить отзыв{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Оставить отзыв на "{{ equipment.title }}"</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Отправить отзыв</button>
        <a href="{% url 'equipment_detail' equipment.pk %}" class="btn btn-secondary">Назад</a>
    </form>
</div>
{% endblock %}
