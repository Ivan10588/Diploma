{% extends "base.html" %}


{% block title %}Вход{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h3 class="text-center">Вход в аккаунт</h3>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="{{ form.username.id_for_label }}" class="form-label">Имя пользователя</label>
              {{ form.username }}
            </div>
            <div class="mb-3">
              <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
              {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
          </form>
          <div class="mt-3">
            <a href="{% url 'users:register' %}">Нет аккаунта? Зарегистрируйтесь</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
